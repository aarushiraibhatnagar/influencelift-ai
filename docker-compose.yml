services:
  app:
    build: .
    command: streamlit run app/Home.py --server.address=0.0.0.0 --server.port=8501
    ports:
      - "8501:8501"
    environment:
      MODEL_PATH: /app/artifacts/model_bundle.joblib
    volumes:
      - model-artifacts:/app/artifacts

  api:
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      MODEL_PATH: /app/artifacts/model_bundle.joblib
    volumes:
      - model-artifacts:/app/artifacts

volumes:
  model-artifacts:
