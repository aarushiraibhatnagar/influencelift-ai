name: Bug report
description: Report reproducible incorrect behaviour.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    attributes:
      label: What happened?
      description: Include the expected and actual behaviour.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: input
    attributes:
      label: Python version
  - type: textarea
    attributes:
      label: Relevant logs
      render: shell
