name: Deployment smoke test

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install application
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Start Streamlit
        run: |
          python -m streamlit run app/Home.py \
            --server.headless true \
            --server.address 127.0.0.1 \
            --server.port 8501 \
            > streamlit.log 2>&1 &
          echo $! > streamlit.pid

      - name: Verify Streamlit health
        run: |
          for attempt in {1..60}; do
            if curl --fail --silent --show-error http://127.0.0.1:8501/_stcore/health; then
              exit 0
            fi
            sleep 2
          done
          cat streamlit.log
          exit 1

      - name: Start FastAPI
        run: |
          python -m uvicorn api.main:app \
            --host 127.0.0.1 \
            --port 8000 \
            > api.log 2>&1 &
          echo $! > api.pid

      - name: Verify FastAPI health
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent --show-error http://127.0.0.1:8000/health; then
              exit 0
            fi
            sleep 2
          done
          cat api.log
          exit 1

      - name: Show service logs on failure
        if: failure()
        run: |
          echo "--- Streamlit log ---"
          cat streamlit.log || true
          echo "--- FastAPI log ---"
          cat api.log || true

      - name: Stop services
        if: always()
        run: |
          test -f streamlit.pid && kill "$(cat streamlit.pid)" || true
          test -f api.pid && kill "$(cat api.pid)" || true
